<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天气预报</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>天气预报</h1>
        <div class="weather-search">
            <label for="cityInput">城市</label>
            <input type="text" id="cityInput" placeholder="输入城市名称">
            <button id="searchButton">
                <i class="fas fa-search"></i> 搜索
            </button>
            <div class="home-button-container">
                <button id="homeButton" onclick="window.location.href='../index.html'">
                    <i class="fas fa-home"></i> 返回首页
                </button>
            </div>
        </div>
        <div class="weather-info">
            <div class="current-weather">
                <div class="weather-icon">
                    <!-- 天气图标将由JavaScript动态添加 -->
                </div>
                <div class="weather-details">
                    <h2 id="cityName">--</h2>
                    <p id="currentDate">--</p>
                    <p class="temperature"><span id="temperature">--</span>°C</p>
                    <p id="weatherDescription">--</p>
                    <div class="weather-data">
                        <div class="data-item">
                            <i class="fas fa-wind"></i>
                            <span id="windSpeed">--</span> km/h
                        </div>
                        <div class="data-item">
                            <i class="fas fa-tint"></i>
                            <span id="humidity">--</span>%
                        </div>
                        <div class="data-item">
                            <i class="fas fa-compress-arrows-alt"></i>
                            <span id="pressure">--</span> hPa
                        </div>
                    </div>
                </div>
            </div>
            <div class="forecast-container">
                <h3>5天预报</h3>
                <div class="forecast" id="forecast">
                    <!-- 预报将由JavaScript动态添加 -->
                </div>
            </div>
        </div>
        <div class="loader" id="weatherLoader"></div>
        <div class="error-message" id="errorMessage"></div>
    </div>
    <script src="../js/global.js"></script>
    <script src="../js/weather.js"></script>
</body>
</html>
