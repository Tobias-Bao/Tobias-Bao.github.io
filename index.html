<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        /* Spezifische Stile für die Startseite */
        .nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }
        
        .nav button {
            position: relative;
            overflow: hidden;
            margin: 15px 0;
            animation: fadeInUp 0.5s ease-out;
            animation-fill-mode: both;
        }
        
        .nav button:nth-child(2) {
            animation-delay: 0.1s;
        }
        
        .nav button:nth-child(3) {
            animation-delay: 0.2s;
        }
        
        h1 {
            animation: fadeIn 0.8s ease-out;
            margin-bottom: 30px;
            color: #333;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }
        
        .feature-list {
            text-align: left;
            margin: 30px 0;
            padding: 0 20px;
            animation: fadeIn 1s ease-out;
            animation-delay: 0.3s;
            animation-fill-mode: both;
        }
        
        .feature-list h2 {
            color: #007bff;
            margin-bottom: 15px;
        }
        
        .feature-list ul {
            list-style-type: none;
            padding: 0;
        }
        
        .feature-list li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
        }
        
        .feature-list li:before {
            content: '✓';
            color: #28a745;
            position: absolute;
            left: 0;
            top: 0;
        }
        
        .dark-mode h1 {
            color: #f0f0f0;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        .dark-mode .feature-list h2 {
            color: #4da3ff;
        }
        
        .dark-mode .feature-list li:before {
            color: #5cb85c;
        }
        
        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Grundlegende Seitenlayout */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .main-content {
            flex: 1;
        }
        
        /* Stile für den Fußbereich mit Autorinformationen */
        .author-info {
            margin-top: 40px;
            padding: 15px 0;
            text-align: center;
            border-top: 1px solid #eaeaea;
            font-size: 0.9em;
            color: #666;
            animation: fadeIn 0.8s ease-out;
            width: 100%;
            position: relative;
            clear: both;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
        }
        
        .author-info a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        
        .author-info a:hover {
            color: #0056b3;
            text-decoration: underline;
        }
        
        .dark-mode .author-info {
            border-top-color: #444;
            color: #aaa;
        }
        
        .dark-mode .author-info a {
            color: #4da3ff;
        }
        
        .dark-mode .author-info a:hover {
            color: #75b7ff;
        }
    </style>
</head>
<body>
    <div class="container main-content">
        <h1>欢迎来到工具首页</h1>
        
        <div class="feature-list">
            <h2>汇率转换器功能</h2>
            <ul>
                <li>支持多种货币转换</li>
                <li>实时获取最新汇率</li>
                <li>查看历史汇率趋势</li>
                <li>自动计算转换结果</li>
                <li>支持暗黑模式</li>
            </ul>
        </div>
        
        <div class="feature-list">
            <h2>天气预报功能</h2>
            <ul>
                <li>全球城市天气查询</li>
                <li>实时天气状况显示</li>
                <li>5天天气预报</li>
                <li>温度、湿度、风速等详细数据</li>
                <li>支持暗黑模式</li>
            </ul>
        </div>
        
        <div class="nav">
            <button onclick="window.location.href='partials/converter.html'">
                <i class="fas fa-exchange-alt"></i> 汇率转换器
            </button>
            <button onclick="window.location.href='partials/weather.html'">
                <i class="fas fa-cloud-sun"></i> 天气预报
            </button>
            <!-- 在这里可以添加更多按钮 -->
        </div>
    </div>
    
    <footer class="author-info">
        <p>
            <!-- 作者信息 -->
            <span>作者: </span>
            <a href="https://changlai-bao.github.io/cn/index.html" target="_blank">Changlai Bao</a>
        </p>
    </footer>
    
    <script src="js/global.js"></script>
</body>
</html>
